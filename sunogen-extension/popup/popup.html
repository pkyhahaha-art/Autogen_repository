<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>SunoGen</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">

    <!-- ── Header ── -->
    <header class="header">
      <div class="header-brand">
        <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="9" cy="18" r="3"/><circle cx="18" cy="15" r="3"/>
          <polyline points="12 18 12 8 21 5"/>
        </svg>
        <span class="brand-name">SunoGen</span>
        <span class="brand-version">v1.0</span>
      </div>
      <button class="btn-icon" id="btn-settings" aria-label="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
          <path d="M12 2v2m0 16v2M2 12h2m16 0h2"/>
        </svg>
      </button>
    </header>

    <!-- ── Error Banner ── -->
    <div class="error-banner hidden" id="error-banner" role="alert">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span class="error-msg" id="error-msg"></span>
      <button class="btn-dismiss" id="btn-error-dismiss" aria-label="ปิด">✕</button>
    </div>

    <!-- ── View Container ── -->
    <main id="view-container">

      <!-- ══ View: Config ══ -->
      <div class="view" id="view-config">
        <section class="section">
          <div class="section-head">
            <span class="section-title">Genre</span>
            <input class="search-input" id="genre-search" type="text" placeholder="ค้นหา..." autocomplete="off">
          </div>
          <div class="genre-tabs" id="genre-tabs" role="tablist"></div>
          <div class="genre-grid" id="genre-grid" role="listbox" aria-label="เลือก Genre"></div>
          <div class="custom-genre-wrap hidden" id="custom-genre-wrap">
            <input class="text-input" id="custom-genre-input" type="text" placeholder="พิมพ์ genre เอง เช่น Bossa Nova Jazz...">
          </div>
        </section>

        <section class="section">
          <div class="section-head">
            <span class="section-title">Mood</span>
            <span class="section-badge" id="mood-count">0 / 3</span>
          </div>
          <div class="mood-chips" id="mood-chips" role="group" aria-label="เลือก Mood (สูงสุด 3)"></div>
        </section>

        <section class="section">
          <div class="section-head"><span class="section-title">Parameters</span></div>
          <div class="param-rows">
            <div class="param-row">
              <span class="param-label">BPM</span>
              <div class="btn-pill-group" id="bpm-group" role="group">
                <button class="btn-pill" data-value="slow">Slow</button>
                <button class="btn-pill btn-pill-active" data-value="mid">Mid</button>
                <button class="btn-pill" data-value="fast">Fast</button>
                <button class="btn-pill" data-value="very_fast">Very Fast</button>
              </div>
            </div>
            <div class="param-row">
              <span class="param-label">Vocal</span>
              <div class="btn-pill-group" id="vocal-group" role="group">
                <button class="btn-pill btn-pill-active" data-value="no_vocals">No Vocals</button>
                <button class="btn-pill" data-value="male vocal">Male</button>
                <button class="btn-pill" data-value="female vocal">Female</button>
                <button class="btn-pill" data-value="choir">Choir</button>
                <button class="btn-pill" data-value="rap">Rap</button>
              </div>
            </div>
            <div class="param-row">
              <span class="param-label">Lyrics</span>
              <div class="btn-pill-group" id="language-group" role="group">
                <button class="btn-pill btn-pill-active" data-value="instrumental">Instrumental</button>
                <button class="btn-pill" data-value="english">English</button>
                <button class="btn-pill" data-value="thai">Thai</button>
                <button class="btn-pill" data-value="auto">Auto</button>
              </div>
            </div>
            <div class="param-row">
              <span class="param-label">Duration</span>
              <div class="btn-pill-group" id="duration-group" role="group">
                <button class="btn-pill" data-value="short">~1 min</button>
                <button class="btn-pill btn-pill-active" data-value="medium">~2 min</button>
                <button class="btn-pill" data-value="long">~3 min</button>
              </div>
            </div>
          </div>
        </section>

        <section class="section">
          <div class="section-head">
            <span class="section-title">Custom Keywords</span>
            <span class="section-hint">optional</span>
          </div>
          <textarea class="textarea" id="custom-additions" rows="2" placeholder="เพิ่ม keywords เช่น smooth jazzy chords, rainy day vibes..."></textarea>
        </section>

        <section class="section">
          <div class="section-head">
            <span class="section-title">Prompt Preview</span>
            <button class="btn-ghost" id="btn-regen-prompt">↺ Regenerate</button>
          </div>
          <textarea class="textarea prompt-textarea" id="prompt-preview" rows="3" spellcheck="false" placeholder="เลือก Genre และ Mood เพื่อดู prompt อัตโนมัติ..."></textarea>
          <div class="prompt-footer">
            <span class="prompt-char-count" id="prompt-char-count">0 chars</span>
            <button class="btn-copy" id="btn-copy-prompt">Copy</button>
          </div>
        </section>

        <div class="action-bar">
          <div class="count-wrap">
            <span class="count-label">จำนวนเพลง</span>
            <div class="btn-pill-group" id="count-group" role="group">
              <button class="btn-pill" data-value="1">1</button>
              <button class="btn-pill btn-pill-active" data-value="2">2</button>
              <button class="btn-pill" data-value="3">3</button>
              <button class="btn-pill" data-value="4">4</button>
            </div>
          </div>
          <button class="btn-primary btn-generate" id="btn-generate">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            Generate
          </button>
        </div>
      </div>

      <!-- ══ View: Progress ══ -->
      <div class="view hidden" id="view-progress">
        <div class="progress-header">
          <p class="progress-title">กำลังสร้างเพลง...</p>
          <span class="progress-elapsed" id="progress-elapsed">0:00</span>
        </div>
        <div class="progress-steps" id="progress-steps">
          <div class="step" id="step-open-suno">
            <div class="step-indicator">1</div>
            <span class="step-label">เปิดหน้า Suno</span>
          </div>
          <div class="step" id="step-fill-prompt">
            <div class="step-indicator">2</div>
            <span class="step-label">กรอก Prompt</span>
          </div>
          <div class="step" id="step-submit">
            <div class="step-indicator">3</div>
            <span class="step-label">เริ่ม Generate</span>
          </div>
          <div class="step" id="step-wait">
            <div class="step-indicator"><span class="spinner"></span></div>
            <span class="step-label">รอ Suno สร้างเพลง...</span>
          </div>
          <div class="step" id="step-download-audio">
            <div class="step-indicator">5</div>
            <span class="step-label">ดาวน์โหลด Audio</span>
          </div>
        </div>
        <div class="progress-actions">
          <button class="btn-secondary" id="btn-cancel">ยกเลิก</button>
          <button class="btn-secondary" id="btn-copy-prompt-progress">Copy Prompt</button>
        </div>
      </div>

      <!-- ══ View: Results ══ -->
      <div class="view hidden" id="view-results">
        <div class="results-header">
          <p class="results-title">เพลงพร้อมแล้ว 🎵</p>
          <button class="btn-ghost" id="btn-back-to-config">← สร้างใหม่</button>
        </div>
        <div class="track-list" id="track-list"></div>
        <div class="results-actions">
          <button class="btn-secondary" id="btn-download-all" style="display:none;width:100%">⬇ Download All</button>
        </div>
      </div>

    </main>
  </div>

  <!-- lamejs must load before the module so `lamejs` is defined globally -->
  <script src="../lib/lame.min.js"></script>
  <script src="popup.js" type="module"></script>
</body>
</html>
